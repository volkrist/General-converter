name: general_converter
description: "Image converter app — pick, convert, and save images between formats."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  image_picker: ^1.1.2
  image: ^4.5.3
  path_provider: ^2.1.5
  saver_gallery: ^4.0.1
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
