name: general_converter
description: "Image converter app — pick, convert, and save images between formats."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  image: ^4.7.2
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_image_compress: ^2.4.0
  flutter_avif: ^3.1.0
  flutter_avif_platform_interface: ^3.1.0
  heif_converter: ^1.0.1
  saver_gallery: ^4.0.1
  share_plus: ^12.0.1
  pdf: ^3.12.0
  pdfx: ^2.6.0
  file_picker: ^10.3.10
  image_picker: ^1.2.1
  receive_sharing_intent: ^1.8.1
  open_file: ^3.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 28

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
